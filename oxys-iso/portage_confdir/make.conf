# OxysOS portage config — referenced by both specs via `portage_confdir`.
# catalyst merges this into /etc/portage inside the build chroot.
# ---------------------------------------------------------------------------

# Pull prebuilt binary packages from the official Gentoo binhost where
# available, for the live-env packages that ARE still emerged normally here
# (parted, dracut, NetworkManager, firmware, etc. -- see
# specs/installcd-stage1.spec). This is catalyst's "--getbinpkg" — there is no
# per-spec flag for it; it is a portage FEATURE. The kernel and zfs-kmod are
# NOT emerged at all anymore (see specs/installcd-stage2.spec) so this doesn't
# affect them.
FEATURES="getbinpkg parallel-fetch"
# Mesa is capability-defining for the image. Never reuse a local or remote
# binary package selected under a different VIDEO_CARDS policy; build it from
# source and let the finalizer verify its VDB flags and driver artifacts.
EMERGE_DEFAULT_OPTS="--usepkg-exclude media-libs/mesa"

# Build the ISO's native C/C++ packages with GCC. LLVM/Clang is still allowed
# as a package dependency (Mesa and parts of the graphics stack require LLVM),
# but it is not the default compiler used by Portage.
CC="gcc"
CXX="g++"
CPP="cpp"

# Official Gentoo binary package host, x86-64-v3 variant -- matches our
# `march: X86_64V3` build, so pulled binaries are v3-optimised (and the v3 set is
# larger than plain x86-64). NOTE: every Gentoo binhost is built on the
# 17.0/hardened, multilib, split-usr profile (the "23.0" here is just the release
# directory, NOT a 23.0-profile binhost -- none exists). Our target is
# 23.0/no-multilib/merged-usr, so hits are OPPORTUNISTIC: base-system libs whose
# requested USE matches a published multi-instance build get pulled; the custom
# Wayland desktop (and niri/noctalia, which aren't in the binhost at all) is
# compiled. That source cost is paid ONCE here in the bake, then rsync'd to every
# install -- which is the whole point of baking.
#
# getbinpkg only ACCEPTS a binpkg if its signature verifies. The binhost is
# signed with sec-keys/openpgp-keys-gentoo-release; if that key isn't trusted in
# the build env, portage silently rejects every binpkg and falls back to source.
# If the bake is compiling things you expected to pull, that missing trust is the
# usual cause -- add "-binpkg-request-signature" to FEATURES to skip the check.
PORTAGE_BINHOST="https://distfiles.gentoo.org/releases/amd64/binpackages/23.0/x86-64-v3/"

# Binhost-first desktop baseline. This intentionally accepts some extra
# dependency footprint so Portage can reuse Gentoo's x86-64-v3 binpkg variants
# instead of falling back to source for common desktop libraries. OpenRC is the
# init system: `elogind` (NOT `systemd`) MUST be the session/logind backend.
# `USE=systemd` is not just "library integration" -- it makes logind consumers
# (dbus, polkit, NetworkManager) depend on sys-apps/systemd, which then owns
# /sbin/init and boots systemd instead of OpenRC, silently breaking the ISO's
# /etc/inittab autologin and every OpenRC rcadd service. `-systemd elogind`
# keeps sys-apps/systemd out and OpenRC in charge.
# Qt is kept package-local: forcing global qt6 pulls KDE Frameworks through
# unrelated packages such as pinentry, which the niri desktop does not need.
# removed pulseaudio so that there are no 2 competing daemons
USE="X wayland dbus -systemd elogind policykit alsa pipewire vulkan opengl gtk jpeg png webp svg fontconfig harfbuzz udev ssl threads unicode"

# This default can be replaced by OXYS_VIDEO_CARDS in build.sh. `virgl`
# supplies Mesa's virtio GPU renderer for accelerated QEMU guests.
VIDEO_CARDS="intel radeon radeonsi amdgpu virgl"
INPUT_DEVICES="libinput"
LLVM_TARGETS="AMDGPU X86"

# sys-boot/grub: build only the x86_64 EFI target. The installer runs
# `grub-install --target=x86_64-efi` from the live env (see
# specs/installcd-stage1.spec), which needs the efi-64 platform modules
# present. Left unset, grub may build no matching platform (or a getbinpkg
# grub built for a different platform set), and grub-install fails.
GRUB_PLATFORMS="efi-64"

# sys-kernel/linux-firmware ships redistributable-but-non-free binary blobs,
# masked by this license until explicitly accepted. Needed for real hardware
# support on the live/install image (WiFi, GPU, storage controllers, etc).
ACCEPT_LICENSE="@FREE linux-fw-redistributable"

# Use all available CPUs except one, with GNU nproc's minimum of 1.
# MAKEOPTS parallelises each package's build; EMERGE_DEFAULT_OPTS also lets
# Portage build independent packages concurrently.  The matching load limits
# prevent either layer from deliberately scheduling more work once all but the
# reserved CPU are busy.
MAKEOPTS="-j$(nproc --ignore=1) -l$(nproc --ignore=1)"
EMERGE_DEFAULT_OPTS="--jobs=$(nproc --ignore=1) --load-average=$(nproc --ignore=1) --binpkg-respect-use=y"
