# OxysOS: the GURU overlay, for user-selectable packages that live outside the
# main Gentoo tree (e.g. gui-wm/niri, gui-shells/noctalia). The tree itself is
# shipped inside the image at /var/db/repos/guru (cloned by the ISO fsscript)
# and rsync'd onto the installed system, so on-target `emerge` can build these
# offline. auto-sync is off to keep the shipped snapshot stable.
[guru]
location = /var/db/repos/guru
sync-type = git
sync-uri = https://github.com/gentoo/guru.git
auto-sync = no
