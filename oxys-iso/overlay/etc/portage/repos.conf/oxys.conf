# OxysOS first-party overlay: ebuilds for packages Oxys ships that aren't in the
# Gentoo tree or GURU (e.g. gui-shells/noctalia). The tree is shipped inside the
# image at /var/db/repos/oxys (via the ISO root overlay) and rsync'd onto the
# installed system, so on-target `emerge` can build these offline. Static
# ebuilds, so no sync.
[oxys]
location = /var/db/repos/oxys
auto-sync = no
